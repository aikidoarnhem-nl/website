site:
  name: 'Aikidoschool Sankaku'
  site: 'https://www.aikidoarnhem.nl'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: xxx-XXXX_XXXX

# SEO metadata
metadata:
  title:
    default: 'Aikido in Arnhem'
    template: '%s — aikido'
  description: "Leer Aikido in Presikhaaf (Arnhem Oost) bij Aikidoschool Sankaku. Aikido-lessen voor beginners en gevorderden. Meld je aan voor een proefles!"
  robots:
    index: true
    follow: true
  openGraph:
    site_name: 'Aikido in Arnhem - Aikido Lessen'
    description: 'Leer Aikido in Arnhem bij Aikidoschool Sankaku. Aikido-lessen voor beginners en gevorderden.'
    images:
      - url: '~/assets/images/ikkyo200.jpg'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@onwidget'
    site: '@onwidget'
    cardType: summary_large_image
    title: 'Aikido in Arnhem - Aikido Lessen'
    description: 'Leer Aikido in Arnhem bij Aikidoschool Sankaku. Aikido-lessen voor beginners en gevorderden.'

i18n:
  language: nl
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
